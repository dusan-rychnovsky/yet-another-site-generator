<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Recept na: [title]</title>
  </head>
  <body>
    <h1>Recept na: [title]</h1>
    <h2>Suroviny:</h2>
    <ul>
    [FOR ingredient IN ingredients]
      <li>[ingredient]</li>
    [ENDFOR ingredient]
    </ul>
    <h2>Příprava:</h2>
    <ul>
    [FOR step IN instructions]
      <li>[step]</li>
    [ENDFOR step]
    </ul>
  </body>
</html>
